<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no">
  <title>Сайт на разработке — iSAYFULLAH</title>
  <meta name="description" content="Сайт находится в процессе создания. Завтра здесь появится контент.">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Oswald:wght@300;400;500;600;700&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      background: #0a0a0a;
      height: 100%;
    }
    body {
      font-family: 'Hanken Grotesk', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 20px;
      background: radial-gradient(ellipse at 50% 30%, #1a1a1a 0%, #0a0a0a 70%);
    }
    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    /* Логотип */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 48px;
      text-decoration: none;
    }
    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      border-radius: 12px;
      background: linear-gradient(150deg, #232323, #050505);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.07), 0 4px 16px rgba(0,0,0,.5);
    }
    .logo-badge span {
      font: 700 20px 'Oswald', sans-serif;
      color: #e7e7e7;
      letter-spacing: .04em;
    }
    .logo-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.05;
    }
    .logo-text .brand {
      font: 700 18px 'Oswald', sans-serif;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #f0f0f0;
    }
    .logo-text .sub {
      font: 500 12px 'Oswald', sans-serif;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #787878;
      margin-top: 2px;
    }

    /* Основной блок */
    .status-icon {
      margin-bottom: 32px;
      display: flex;
      justify-content: center;
    }
    .status-icon svg {
      width: 56px;
      height: 56px;
      color: #d8d8d8;
      opacity: 0.6;
    }

    h1 {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: clamp(32px, 8vw, 56px);
      color: #f2f2f2;
      letter-spacing: .01em;
      line-height: 1.05;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    h1 span {
      font-weight: 500;
      display: inline-block;
    }

    .message {
      font-size: clamp(16px, 2.4vw, 22px);
      font-weight: 400;
      color: #b4b4b4;
      line-height: 1.55;
      margin-bottom: 12px;
      letter-spacing: .02em;
    }

    .sub-message {
      font-size: clamp(14px, 1.6vw, 18px);
      font-weight: 300;
      color: #6b6b6b;
      margin-bottom: 40px;
      letter-spacing: .04em;
    }

    /* Прогресс-бар */
    .progress-wrap {
      width: 100%;
      max-width: 340px;
      margin: 0 auto 48px;
    }
    .progress-track {
      position: relative;
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,.08);
      border-radius: 1px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #d8d8d8, #f2f2f2);
      border-radius: 1px;
      animation: fillProgress 2.8s ease-in-out forwards;
    }
    @keyframes fillProgress {
      0% { width: 0%; }
      40% { width: 38%; }
      70% { width: 72%; }
      100% { width: 100%; }
    }

    .progress-label {
      display: block;
      margin-top: 12px;
      font: 500 11px 'Oswald', sans-serif;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #6b6b6b;
    }

    /* Контакт — опционально, но в стиле сайта */
    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font: 600 12px 'Oswald', sans-serif;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #c8c8c8;
      text-decoration: none;
      border: 1px solid rgba(210,210,210,.16);
      padding: 14px 28px;
      border-radius: 10px;
      transition: border-color .3s, background .3s;
    }
    .contact-link:hover {
      border-color: rgba(210,210,210,.4);
      background: rgba(255,255,255,.04);
    }
    .contact-link svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 1.6;
      fill: none;
    }

    /* Адаптивность */
    @media (max-width: 480px) {
      .logo-badge {
        width: 42px;
        height: 42px;
      }
      .logo-badge span {
        font-size: 16px;
      }
      .logo-text .brand {
        font-size: 15px;
      }
      .logo-text .sub {
        font-size: 10px;
      }
      .contact-link {
        padding: 12px 22px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Логотип -->
    <a href="/" class="logo" aria-label="iSAYFULLAH">
      <span class="logo-badge">
        <span>iS</span>
      </span>
      <span class="logo-text">
        <span class="brand">iSAYFULLAH</span>
        <span class="sub">Скоро запуск</span>
      </span>
    </a>

    <!-- Иконка-индикатор -->
    <div class="status-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3L4 6v6c0 4 3.4 6.8 8 9 4.6-2.2 8-5 8-9V6l-8-3z" />
        <path d="M9 12l2 2 4-4" />
      </svg>
    </div>

    <!-- Заголовок -->
    <h1>Сайт<br><span>на разработке</span></h1>

    <!-- Сообщение -->
    <p class="message">Завтра тут будет контент)</p>

    <!-- Прогресс-бар -->
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-bar"></div>
      </div>
      <span class="progress-label">Сборка системы</span>
    </div>

    <!-- Опциональный контакт в Telegram -->
    <a href="https://t.me/iamSayfullah" target="_blank" rel="noopener" class="contact-link">
      <span>Написать в Telegram</span>
      <svg viewBox="0 0 24 24"><path d="M7 17 17 7M9 7h8v8"/></svg>
    </a>
  </div>

</body>
</html>
